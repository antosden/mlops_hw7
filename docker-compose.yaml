services:

  ml-service-v1:
    build: .
    container_name: ml-v1
    expose:
      - "8000"

  ml-service-v2:
    build: .
    container_name: ml-v2
    expose:
      - "8000"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    depends_on:
      - ml-service-v1
      - ml-service-v2
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro